# HarmonyLab Cloud Build Configuration
# MP115: Added warm-on-deploy pattern (GIT_SHA + ingest_code.py after deploy)

steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--no-cache'
      - '--build-arg'
      - 'COMMIT_SHA=$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/harmonylab:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/harmonylab:latest'
      - '.'
    id: 'build'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/harmonylab:$COMMIT_SHA']
    id: 'push'
    waitFor: ['build']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/harmonylab:latest']
    waitFor: ['build']

  # MP115: Deploy with GIT_SHA env var so code_files staleness checks key on the correct SHA.
  # --update-env-vars preserves existing secrets; does not overwrite DB_PASSWORD etc.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'harmonylab'
      - '--image'
      - 'gcr.io/$PROJECT_ID/harmonylab:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--update-env-vars'
      - 'GIT_SHA=$COMMIT_SHA'
      - '--update-secrets'
      - 'APP_PASSPHRASE=app-passphrase:latest,APP_SECRET_KEY=app-secret-key:latest'
    id: 'deploy'
    waitFor: ['push']

  # MP132 BV-13: Post-deploy hardening gate â€” verify required state survived deploy.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SERVICE="harmonylab"
        REQUIRED="GIT_SHA,DB_SERVER,DB_NAME,DB_USER,DB_PASSWORD,ANTHROPIC_API_KEY,APP_PASSPHRASE,APP_SECRET_KEY"
        echo "[HARDENGATE] Post-deploy state check: service=$$SERVICE sha=$COMMIT_SHA"
        ENV_JSON=$(gcloud run services describe "$$SERVICE" \
          --region=us-central1 \
          --format="json(spec.template.spec.containers[0].env)")
        PRESENT=$(echo "$$ENV_JSON" | python3 -c "
import json,sys
d=json.load(sys.stdin)
envs=(d.get('spec') or {}).get('template',{}).get('spec',{}).get('containers',[{}])[0].get('env',[])
print('\n'.join(e.get('name','') for e in envs))
        ")
        MISSING=""
        IFS=',' read -ra VARS <<< "$$REQUIRED"
        for VAR in "$${VARS[@]}"; do
          if echo "$$PRESENT" | grep -qx "$$VAR"; then
            echo "[HARDENGATE][OK]   $$VAR present"
          else
            echo "[HARDENGATE][FAIL] MISSING: $$VAR"
            MISSING="$$MISSING $$VAR"
          fi
        done
        if [ -n "$$MISSING" ]; then
          echo "[HARDENGATE][FAIL] Gate failed â€” missing:$$MISSING"
          exit 1
        fi
        echo "[HARDENGATE][PASS] All required state confirmed for $$SERVICE"
    id: 'hardengate'
    waitFor: ['deploy']

  # Warm-on-deploy ingest. set -e fails the build loudly if ingest fails.
  - name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        pip install -q pymssql
        python ingest_code.py --app hl --repo-root . --sha $COMMIT_SHA --trigger-src cloudbuild
        echo "MP132: ingest completed for hl sha=$COMMIT_SHA"
    env:
      - 'DB_HOST=# HarmonyLab Cloud Build Configuration
