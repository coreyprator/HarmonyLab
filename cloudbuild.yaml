# HarmonyLab Cloud Build Configuration
# MP115: Added warm-on-deploy pattern (GIT_SHA + ingest_code.py after deploy)

steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--no-cache'
      - '--build-arg'
      - 'COMMIT_SHA=$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/harmonylab:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/harmonylab:latest'
      - '.'
    id: 'build'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/harmonylab:$COMMIT_SHA']
    id: 'push'
    waitFor: ['build']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/harmonylab:latest']
    waitFor: ['build']

  # MP115: Deploy with GIT_SHA env var so code_files staleness checks key on the correct SHA.
  # --update-env-vars preserves existing secrets; does not overwrite DB_PASSWORD etc.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'harmonylab'
      - '--image'
      - 'gcr.io/$PROJECT_ID/harmonylab:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--update-env-vars'
      - 'GIT_SHA=$COMMIT_SHA'
      - '--update-secrets'
      - 'APP_PASSPHRASE=app-passphrase:latest,APP_SECRET_KEY=app-secret-key:latest'
    id: 'deploy'
    waitFor: ['push']

  # MP115: Warm-on-deploy ingest. Runs after every deploy so code_files is pre-warmed
  # with the deployed GIT_SHA. set -e fails the build loudly if ingest fails.
  - name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        pip install -q pymssql
        python ingest_code.py --app hl --repo-root . --sha $COMMIT_SHA --trigger-src cloudbuild
        echo "MP115: ingest completed for hl sha=$COMMIT_SHA"
    env:
      - 'DB_HOST=35.224.242.223'
    secretEnv: ['DB_PASSWORD']
    id: 'ingest'
    waitFor: ['deploy']

availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/db-password/versions/latest
    env: 'DB_PASSWORD'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/harmonylab:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/harmonylab:latest'

timeout: '1200s'
