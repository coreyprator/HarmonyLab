server {
    listen 8080;
    server_name _;

    # HM44 Phase C (C1/B5): harmonylab-frontend is now a transparent
    # reverse-proxy to the single harmonylab service. The redesign UI,
    # all API routes, and /health are served same-origin from harmonylab.
    # This makes the custom domain harmonylab.rentyourcio.com serve the
    # new UI without requiring a domain-remapping operation.

    location / {
        proxy_pass https://harmonylab-57478301787.us-central1.run.app;
        proxy_http_version 1.1;
        proxy_set_header Host harmonylab-57478301787.us-central1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # BUG-024: OMR import can take up to ~60s
        proxy_read_timeout 300;
        proxy_send_timeout 300;
        proxy_connect_timeout 60;
        proxy_buffering off;
    }
}
