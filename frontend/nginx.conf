server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to backend
    location /api/ {
        proxy_pass https://harmonylab-57478301787.us-central1.run.app/api/;
        proxy_http_version 1.1;
        proxy_set_header Host harmonylab-57478301787.us-central1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_domain harmonylab-57478301787.us-central1.run.app $host;
        proxy_redirect https://harmonylab-57478301787.us-central1.run.app/ /;
        # BUG-024: /import can take up to ~60s; raise timeouts to prevent 504
        proxy_read_timeout 300;
        proxy_send_timeout 300;
        proxy_connect_timeout 60;
    }

    location = /login.html {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        proxy_pass https://harmonylab-57478301787.us-central1.run.app/health;
        proxy_http_version 1.1;
        proxy_set_header Host harmonylab-57478301787.us-central1.run.app;
        proxy_ssl_server_name on;
    }
}
