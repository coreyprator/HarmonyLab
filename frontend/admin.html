<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - HarmonyLab</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-container { max-width: 960px; margin: 0 auto; padding: 20px; }
        .rules-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        .rules-table th, .rules-table td { padding: 8px 12px; border: 1px solid var(--border, #374151); text-align: left; font-size: 13px; }
        .rules-table th { background: var(--bg-secondary, #1e1e2e); font-weight: 600; }
        .rules-table tr:hover { background: var(--bg-hover, #2a2a3e); }
        .rules-table .rule-text { max-width: 400px; font-size: 12px; color: var(--text-muted, #9ca3af); }
        .category-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .cat-key_center { background: #dbeafe; color: #1e40af; }
        .cat-pattern { background: #fef3c7; color: #92400e; }
        .cat-chord_function { background: #d1fae5; color: #065f46; }
        .toggle-active { cursor: pointer; }
        .toggle-active.active { color: #22c55e; }
        .toggle-active.inactive { color: #6b7280; text-decoration: line-through; }
        .add-rule-form { margin-top: 16px; padding: 16px; border: 1px solid var(--border, #374151); border-radius: 8px; background: var(--bg-secondary, #1e1e2e); }
        .add-rule-form label { display: block; margin-bottom: 4px; font-size: 12px; font-weight: 600; }
        .add-rule-form input, .add-rule-form select, .add-rule-form textarea { width: 100%; padding: 6px 10px; border: 1px solid var(--border, #374151); border-radius: 6px; font-size: 13px; background: var(--bg, #0f0f1a); color: var(--text, #e2e8f0); margin-bottom: 12px; box-sizing: border-box; }
        .add-rule-form textarea { resize: vertical; min-height: 60px; }
        .btn-add { background: #3b82f6; color: #fff; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .btn-add:hover { background: #2563eb; }
        .btn-delete { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 14px; }
        .btn-delete:hover { color: #dc2626; }
        .edit-inline { background: transparent; border: 1px solid transparent; color: var(--text, #e2e8f0); padding: 4px 6px; font-size: 13px; width: 100%; box-sizing: border-box; }
        .edit-inline:focus { border-color: #3b82f6; outline: none; background: var(--bg, #0f0f1a); }
    </style>
</head>
<body>
    <nav class="main-nav">
        <a href="index.html" class="nav-brand">HarmonyLab</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Songs</a>
            <a href="riffs.html" class="nav-link">Riffs</a>
            <a href="quiz.html" class="nav-link">Quiz</a>
            <a href="progress.html" class="nav-link">Progress</a>
            <a href="admin.html" class="nav-link" style="font-weight:700;">Admin</a>
        </div>
        <div class="nav-version">v2.38.0</div>
    </nav>

    <div class="admin-container">
        <h1 style="margin-bottom:4px;">Analysis Rules</h1>
        <p style="font-size:13px;color:var(--text-muted, #9ca3af);margin-bottom:16px;">
            These rules are injected into the AI harmonic analysis prompt. Edit inline or add new rules below.
        </p>

        <table class="rules-table" id="rules-table">
            <thead>
                <tr>
                    <th style="width:50px;">Order</th>
                    <th style="width:100px;">Category</th>
                    <th style="width:200px;">Title</th>
                    <th>Rule Text</th>
                    <th style="width:60px;">Active</th>
                    <th style="width:40px;"></th>
                </tr>
            </thead>
            <tbody id="rules-tbody">
                <tr><td colspan="6" style="text-align:center;color:var(--text-muted);">Loading...</td></tr>
            </tbody>
        </table>

        <div class="add-rule-form" id="add-rule-form">
            <h3 style="margin:0 0 12px 0;font-size:14px;">Add Rule</h3>
            <div style="display:grid;grid-template-columns:80px 1fr;gap:8px;">
                <div>
                    <label>Order</label>
                    <input type="number" id="new-order" value="0" min="0">
                </div>
                <div>
                    <label>Category</label>
                    <select id="new-category">
                        <option value="key_center">key_center</option>
                        <option value="pattern">pattern</option>
                        <option value="chord_function">chord_function</option>
                    </select>
                </div>
            </div>
            <label>Title</label>
            <input type="text" id="new-title" placeholder="Rule title">
            <label>Rule Text</label>
            <textarea id="new-rule-text" placeholder="Describe the analysis rule..."></textarea>
            <button class="btn-add" onclick="addRule()">Add Rule</button>
        </div>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost'
            ? 'http://localhost:8000'
            : 'https://harmonylab-wmrla7fhwa-uc.a.run.app';

        let allRules = [];

        async function loadRules() {
            try {
                const res = await fetch(`${API_BASE}/api/v1/analysis-rules/all`);
                allRules = await res.json();
                renderRules();
            } catch (e) {
                document.getElementById('rules-tbody').innerHTML =
                    '<tr><td colspan="6" style="color:#ef4444;">Failed to load rules</td></tr>';
            }
        }

        function renderRules() {
            const tbody = document.getElementById('rules-tbody');
            if (allRules.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);">No rules yet</td></tr>';
                return;
            }
            tbody.innerHTML = allRules.map(r => `
                <tr data-id="${r.id}" class="${r.active ? '' : 'inactive-row'}" style="${r.active ? '' : 'opacity:0.5;'}">
                    <td><input class="edit-inline" type="number" value="${r.rule_order}" onchange="updateField(${r.id},'rule_order',parseInt(this.value))" style="width:50px;"></td>
                    <td><span class="category-badge cat-${r.category}">${esc(r.category)}</span></td>
                    <td><input class="edit-inline" value="${esc(r.title)}" onchange="updateField(${r.id},'title',this.value)"></td>
                    <td class="rule-text"><input class="edit-inline" value="${esc(r.rule_text)}" onchange="updateField(${r.id},'rule_text',this.value)" title="${esc(r.rule_text)}"></td>
                    <td style="text-align:center;">
                        <span class="toggle-active ${r.active ? 'active' : 'inactive'}" onclick="toggleActive(${r.id},${r.active ? 0 : 1})" title="Toggle active">
                            ${r.active ? '&#10003;' : '&#10007;'}
                        </span>
                    </td>
                    <td><button class="btn-delete" onclick="deleteRule(${r.id})" title="Delete">&#128465;</button></td>
                </tr>
            `).join('');
        }

        function esc(s) {
            if (!s) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        async function updateField(id, field, value) {
            const body = {};
            body[field] = value;
            await fetch(`${API_BASE}/api/v1/analysis-rules/${id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            loadRules();
        }

        async function toggleActive(id, newActive) {
            await fetch(`${API_BASE}/api/v1/analysis-rules/${id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({active: !!newActive})
            });
            loadRules();
        }

        async function deleteRule(id) {
            if (!confirm('Delete this rule?')) return;
            await fetch(`${API_BASE}/api/v1/analysis-rules/${id}`, {method: 'DELETE'});
            loadRules();
        }

        async function addRule() {
            const order = parseInt(document.getElementById('new-order').value) || 0;
            const category = document.getElementById('new-category').value;
            const title = document.getElementById('new-title').value.trim();
            const ruleText = document.getElementById('new-rule-text').value.trim();
            if (!title || !ruleText) { alert('Title and rule text are required.'); return; }

            await fetch(`${API_BASE}/api/v1/analysis-rules`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({rule_order: order, category, title, rule_text: ruleText})
            });
            document.getElementById('new-title').value = '';
            document.getElementById('new-rule-text').value = '';
            loadRules();
        }

        loadRules();
    </script>
</body>
</html>
